# Configurazione Netlify: collegando il repo, il sito si pubblica da solo a ogni push.
[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# App a pagina singola: ogni percorso non-file torna a index.html.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
