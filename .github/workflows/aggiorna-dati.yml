name: Aggiorna dati da fonti ufficiali
on:
  schedule:
    - cron: '0 3 * * *'   # ogni notte alle 03:00 UTC
  workflow_dispatch: {}    # eseguibile anche a mano
permissions:
  contents: write
jobs:
  aggiorna:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run aggiorna-dati
      # Solo il feed novita.json viene aggiornato di notte. catalogo.json NON va
      # toccato qui (cambierebbe solo generatoIl = deploy inutili): lo si rigenera
      # a mano con `npm run genera-catalogo` quando si bumpa VERSIONE_CATALOGO.
      - name: Commit e push se ci sono novità
        run: |
          git config user.name "ref-lex-bot"
          git config user.email "bot@users.noreply.github.com"
          if ! git diff --quiet public/dati/novita.json; then
            git add public/dati/novita.json
            git commit -m "Aggiornamento automatico novità dalle fonti ufficiali"
            git push
          fi
